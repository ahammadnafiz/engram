site_name: Engram
site_description: Persistent memory infrastructure for long-running AI agents
site_author: Ahammad Nafiz
site_url: https://ahammadnafiz.github.io/engram

repo_name: ahammadnafiz/engram
repo_url: https://github.com/ahammadnafiz/engram

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.code.annotate

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Core Concepts: concepts.md
  - Task Memory: task-memory.md
  - API Reference: api-reference.md
  - Configuration: configuration.md
  - Architecture: architecture.md
  - Diagrams: diagrams.md
  - Production Guide: production-guide.md
  - Migrations: migrations.md
  - Operations: operations.md
  - Reliability Testing: reliability-testing.md
  - Examples: examples.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            members_order: source

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ahammadnafiz/engram
