site_name: Engram
site_description: Persistent memory infrastructure for long-running AI agents
site_author: Ahammad Nafiz
site_url: https://ahammadnafiz.github.io/engram

repo_name: ahammadnafiz/engram
repo_url: https://github.com/ahammadnafiz/engram

theme:
  name: material
  icon:
    logo: material/brain
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: white
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - toc.follow

nav:
  - Overview: index.md
  - Get started:
      - Quickstart: quickstart.md
      - Core concepts: concepts.md
      - Examples: examples.md
  - Guides:
      - Task memory: task-memory.md
      - Configuration: configuration.md
  - Reference:
      - API reference: api-reference.md
      - Architecture: architecture.md
      - Diagrams: diagrams.md
  - Operations:
      - Production guide: production-guide.md
      - Migrations: migrations.md
      - Running in production: operations.md
      - Reliability testing: reliability-testing.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            members_order: source

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mermaid@10.9.3/dist/mermaid.min.js
  - javascripts/mermaid.js

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ahammadnafiz/engram
