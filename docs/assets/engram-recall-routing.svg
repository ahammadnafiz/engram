<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 768" width="100%" height="100%" style="background-color:#060608;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <defs>
    <marker id="arrR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 1.5 L8.5 5 L0 8.5" fill="none" stroke="#4a4a55" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" />
    </marker>
  </defs>

  <rect width="1280" height="768" fill="#060608" />
  <rect x="592" y="0" width="96" height="4" rx="2" fill="#6d5dfb" />

  <!-- Header -->
  <text x="640" y="92" text-anchor="middle" font-size="46" font-weight="800" fill="#fbfbfd" letter-spacing="-0.5">Intent-routed recall</text>
  <text x="640" y="132" text-anchor="middle" font-size="16" font-weight="400" fill="#8a8a96">recall() classifies what the question is really asking, then routes to the matching surface — current fact,</text>
  <text x="640" y="156" text-anchor="middle" font-size="16" font-weight="400" fill="#8a8a96">history, raw events, full lineage, or a two-anchor temporal chain — before composing a grounded answer.</text>

  <!-- Panel -->
  <rect x="48" y="188" width="1184" height="566" rx="20" fill="#0b0b0f" stroke="#1c1c24" stroke-width="1" />

  <!-- Question -->
  <rect x="80" y="430" width="150" height="80" rx="8" fill="#0e0e13" stroke="#292932" stroke-width="1" />
  <text x="155" y="466" text-anchor="middle" font-size="15" font-weight="600" fill="#f1f1f4">Question</text>
  <text x="155" y="485" text-anchor="middle" font-size="9" font-weight="500" fill="#6e6e79" letter-spacing="1" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">NATURAL LANGUAGE</text>

  <!-- Classify -->
  <rect x="262" y="430" width="176" height="80" rx="8" fill="#11101d" stroke="#3a3469" stroke-width="1.2" />
  <text x="350" y="466" text-anchor="middle" font-size="15" font-weight="600" fill="#eceaff">Classify Intent</text>
  <text x="350" y="485" text-anchor="middle" font-size="9" font-weight="500" fill="#8b85c4" letter-spacing="0.8" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">LLM ROUTER</text>

  <line x1="230" y1="470" x2="262" y2="470" stroke="#3a3a44" stroke-width="1.4" marker-end="url(#arrR)" />

  <!-- fan-out spine -->
  <line x1="438" y1="470" x2="470" y2="470" stroke="#3a3a44" stroke-width="1.4" />
  <line x1="470" y1="262" x2="470" y2="678" stroke="#3a3469" stroke-width="1.3" stroke-dasharray="2 4" />

  <!-- intent rows -->
  <!-- current -->
  <line x1="470" y1="284" x2="506" y2="284" stroke="#3a3a44" stroke-width="1.3" marker-end="url(#arrR)" />
  <rect x="508" y="262" width="250" height="44" rx="8" fill="#15132c" stroke="#3a3469" stroke-width="1" />
  <text x="524" y="285" font-size="13" font-weight="600" fill="#e9e7ff">current</text>
  <text x="742" y="285" text-anchor="end" font-size="8.5" font-weight="500" fill="#8b85c4" letter-spacing="0.4" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">latest value, now</text>
  <text x="784" y="285" font-size="9.5" font-weight="500" fill="#9aa0ac" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">→ search()</text>

  <!-- historical -->
  <line x1="470" y1="334" x2="506" y2="334" stroke="#3a3a44" stroke-width="1.3" marker-end="url(#arrR)" />
  <rect x="508" y="312" width="250" height="44" rx="8" fill="#15132c" stroke="#3a3469" stroke-width="1" />
  <text x="524" y="335" font-size="13" font-weight="600" fill="#e9e7ff">historical</text>
  <text x="742" y="335" text-anchor="end" font-size="8.5" font-weight="500" fill="#8b85c4" letter-spacing="0.4" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">what changed</text>
  <text x="784" y="335" font-size="9.5" font-weight="500" fill="#9aa0ac" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">→ search() + lineage</text>

  <!-- event -->
  <line x1="470" y1="384" x2="506" y2="384" stroke="#3a3a44" stroke-width="1.3" marker-end="url(#arrR)" />
  <rect x="508" y="362" width="250" height="44" rx="8" fill="#15132c" stroke="#3a3469" stroke-width="1" />
  <text x="524" y="385" font-size="13" font-weight="600" fill="#e9e7ff">event</text>
  <text x="742" y="385" text-anchor="end" font-size="8.5" font-weight="500" fill="#8b85c4" letter-spacing="0.4" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">raw conversation</text>
  <text x="784" y="385" font-size="9.5" font-weight="500" fill="#9aa0ac" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">→ search_events()</text>

  <!-- lineage -->
  <line x1="470" y1="434" x2="506" y2="434" stroke="#3a3a44" stroke-width="1.3" marker-end="url(#arrR)" />
  <rect x="508" y="412" width="250" height="44" rx="8" fill="#15132c" stroke="#3a3469" stroke-width="1" />
  <text x="524" y="435" font-size="13" font-weight="600" fill="#e9e7ff">lineage</text>
  <text x="742" y="435" text-anchor="end" font-size="8.5" font-weight="500" fill="#8b85c4" letter-spacing="0.4" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">full revision set</text>
  <text x="784" y="435" font-size="9.5" font-weight="500" fill="#9aa0ac" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">→ get_lineage()</text>

  <!-- temporal_chain -->
  <line x1="470" y1="484" x2="506" y2="484" stroke="#3a3a44" stroke-width="1.3" marker-end="url(#arrR)" />
  <rect x="508" y="462" width="250" height="44" rx="8" fill="#15132c" stroke="#3a3469" stroke-width="1" />
  <text x="524" y="485" font-size="13" font-weight="600" fill="#e9e7ff">temporal_chain</text>
  <text x="742" y="485" text-anchor="end" font-size="8.5" font-weight="500" fill="#8b85c4" letter-spacing="0.4" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">gap between events</text>
  <text x="784" y="485" font-size="9.5" font-weight="500" fill="#9aa0ac" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">→ 2× anchor search</text>

  <!-- chat -->
  <line x1="470" y1="534" x2="506" y2="534" stroke="#3a3a44" stroke-width="1.3" marker-end="url(#arrR)" />
  <rect x="508" y="512" width="250" height="44" rx="8" fill="#0e0e13" stroke="#292932" stroke-width="1" />
  <text x="524" y="535" font-size="13" font-weight="600" fill="#cfcfd6">chat</text>
  <text x="742" y="535" text-anchor="end" font-size="8.5" font-weight="500" fill="#6e6e79" letter-spacing="0.4" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">not a recall</text>
  <text x="784" y="535" font-size="9.5" font-weight="500" fill="#6e6e79" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">→ empty answer</text>

  <!-- converge bracket from surface tags to evidence -->
  <line x1="1004" y1="284" x2="1004" y2="534" stroke="#3a3469" stroke-width="1.3" stroke-dasharray="2 4" />
  <line x1="940" y1="284" x2="1004" y2="284" stroke="#2e2e38" stroke-width="1.1" />
  <line x1="940" y1="335" x2="1004" y2="335" stroke="#2e2e38" stroke-width="1.1" />
  <line x1="940" y1="385" x2="1004" y2="385" stroke="#2e2e38" stroke-width="1.1" />
  <line x1="940" y1="435" x2="1004" y2="435" stroke="#2e2e38" stroke-width="1.1" />
  <line x1="940" y1="485" x2="1004" y2="485" stroke="#2e2e38" stroke-width="1.1" />

  <!-- Evidence -->
  <rect x="1024" y="338" width="168" height="62" rx="9" fill="#0e0e13" stroke="#292932" stroke-width="1" />
  <text x="1108" y="367" text-anchor="middle" font-size="14" font-weight="600" fill="#f1f1f4">Evidence</text>
  <text x="1108" y="384" text-anchor="middle" font-size="8.5" font-weight="500" fill="#6e6e79" letter-spacing="0.6" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">SOURCE-BACKED FACTS</text>
  <line x1="1004" y1="369" x2="1024" y2="369" stroke="#3a3a44" stroke-width="1.3" marker-end="url(#arrR)" />

  <!-- Compose -->
  <rect x="1024" y="428" width="168" height="62" rx="9" fill="#11101d" stroke="#3a3469" stroke-width="1.2" />
  <text x="1108" y="457" text-anchor="middle" font-size="14" font-weight="600" fill="#eceaff">Compose</text>
  <text x="1108" y="474" text-anchor="middle" font-size="8.5" font-weight="500" fill="#8b85c4" letter-spacing="0.6" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">OPTIONAL · compose_answer</text>
  <line x1="1108" y1="400" x2="1108" y2="428" stroke="#3a3a44" stroke-width="1.3" marker-end="url(#arrR)" />

  <!-- RecallAnswer note -->
  <text x="1108" y="520" text-anchor="middle" font-size="9.5" font-weight="600" fill="#8a8a96" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">RecallAnswer</text>
  <text x="1108" y="536" text-anchor="middle" font-size="8" font-weight="500" fill="#6e6e79" letter-spacing="0.5" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">PROSE + STRUCTURED EVIDENCE</text>
  <line x1="1108" y1="490" x2="1108" y2="506" stroke="#3a3a44" stroke-width="1.3" marker-end="url(#arrR)" />

  <!-- caption -->
  <text x="640" y="612" text-anchor="middle" font-size="9" font-weight="600" fill="#6e6e79" letter-spacing="2.5" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">SIX INTENTS · ONE classify → route → compose PATH</text>
  <text x="640" y="640" text-anchor="middle" font-size="11" font-weight="500" fill="#8a8a96">Underlying surfaces run without an LLM; only classification and the final composer need one.</text>

  <!-- Footer -->
  <text x="640" y="730" text-anchor="middle" font-size="11" font-weight="600" fill="#55555f" letter-spacing="4" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">INTENT-ROUTED RECALL</text>
</svg>
