<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 768" width="100%" height="100%" style="background-color:#060608;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <defs>
    <marker id="arrEv" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0 1.5 L8.5 5 L0 8.5" fill="none" stroke="#4a4a55" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" />
    </marker>
  </defs>

  <rect width="1280" height="768" fill="#060608" />
  <rect x="592" y="0" width="96" height="4" rx="2" fill="#6d5dfb" />

  <!-- Header -->
  <text x="640" y="92" text-anchor="middle" font-size="46" font-weight="800" fill="#fbfbfd" letter-spacing="-0.5">Evidence for aggregation</text>
  <text x="640" y="132" text-anchor="middle" font-size="16" font-weight="400" fill="#8a8a96">When the answer is spread across many turns, top-k relevance is not enough. Engram composes public</text>
  <text x="640" y="156" text-anchor="middle" font-size="16" font-weight="400" fill="#8a8a96">primitives — broad multi-query fetch, neighbor expansion, a budgeted block — then reads for the answer.</text>

  <!-- Panel -->
  <rect x="48" y="188" width="1184" height="566" rx="20" fill="#0b0b0f" stroke="#1c1c24" stroke-width="1" />

  <!-- Question -->
  <rect x="84" y="392" width="150" height="80" rx="8" fill="#0e0e13" stroke="#292932" stroke-width="1" />
  <text x="159" y="428" text-anchor="middle" font-size="14" font-weight="600" fill="#f1f1f4">Question</text>
  <text x="159" y="447" text-anchor="middle" font-size="9" font-weight="500" fill="#6e6e79" letter-spacing="0.8" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">AGGREGATION</text>

  <!-- Stage connectors -->
  <line x1="234" y1="432" x2="258" y2="432" stroke="#3a3a44" stroke-width="1.4" marker-end="url(#arrEv)" />
  <line x1="508" y1="432" x2="530" y2="432" stroke="#3a3a44" stroke-width="1.4" marker-end="url(#arrEv)" />
  <line x1="780" y1="432" x2="802" y2="432" stroke="#3a3a44" stroke-width="1.4" marker-end="url(#arrEv)" />
  <line x1="1052" y1="432" x2="1074" y2="432" stroke="#3a3a44" stroke-width="1.4" marker-end="url(#arrEv)" />

  <!-- Stage 1: deep_search -->
  <rect x="260" y="380" width="246" height="104" rx="10" fill="#15132c" stroke="#3a3469" stroke-width="1" />
  <text x="383" y="416" text-anchor="middle" font-size="14.5" font-weight="600" fill="#e9e7ff">deep_search()</text>
  <text x="383" y="436" text-anchor="middle" font-size="9" font-weight="500" fill="#8b85c4" letter-spacing="0.5" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">MULTI-QUERY HYDE</text>
  <text x="383" y="454" text-anchor="middle" font-size="8.5" font-weight="500" fill="#6f699c" letter-spacing="0.5" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">RRF FUSE · HIGH RECALL</text>

  <!-- Stage 2: get_memories -->
  <rect x="532" y="380" width="246" height="104" rx="10" fill="#15132c" stroke="#3a3469" stroke-width="1" />
  <text x="655" y="416" text-anchor="middle" font-size="14.5" font-weight="600" fill="#e9e7ff">get_memories()</text>
  <text x="655" y="436" text-anchor="middle" font-size="9" font-weight="500" fill="#8b85c4" letter-spacing="0.5" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">NEIGHBOR EXPANSION</text>
  <text x="655" y="454" text-anchor="middle" font-size="8.5" font-weight="500" fill="#6f699c" letter-spacing="0.5" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">SESSION / GROUP TURNS</text>

  <!-- Stage 3: get_context_block -->
  <rect x="804" y="380" width="246" height="104" rx="10" fill="#0e0e13" stroke="#292932" stroke-width="1" />
  <text x="927" y="416" text-anchor="middle" font-size="14.5" font-weight="600" fill="#f1f1f4">get_context_block()</text>
  <text x="927" y="436" text-anchor="middle" font-size="9" font-weight="500" fill="#6e6e79" letter-spacing="0.5" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">DETERMINISTIC ORDER</text>
  <text x="927" y="454" text-anchor="middle" font-size="8.5" font-weight="500" fill="#5c5c66" letter-spacing="0.5" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">TOKEN-BUDGETED</text>

  <!-- Stage 4: reader -->
  <rect x="1076" y="392" width="116" height="80" rx="9" fill="#11101d" stroke="#3a3469" stroke-width="1.2" />
  <text x="1134" y="424" text-anchor="middle" font-size="13.5" font-weight="600" fill="#eceaff">Reader</text>
  <text x="1134" y="442" text-anchor="middle" font-size="8" font-weight="500" fill="#8b85c4" letter-spacing="0.4" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">LLM.complete</text>

  <!-- stage labels -->
  <text x="383" y="356" text-anchor="middle" font-size="9" font-weight="600" fill="#6e6e79" letter-spacing="1.5" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">1 · HIGH-RECALL FETCH</text>
  <text x="655" y="356" text-anchor="middle" font-size="9" font-weight="600" fill="#6e6e79" letter-spacing="1.5" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">2 · EXPAND</text>
  <text x="927" y="356" text-anchor="middle" font-size="9" font-weight="600" fill="#6e6e79" letter-spacing="1.5" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">3 · ASSEMBLE</text>

  <!-- answer -->
  <line x1="1134" y1="472" x2="1134" y2="512" stroke="#3a3a44" stroke-width="1.3" marker-end="url(#arrEv)" />
  <text x="1134" y="534" text-anchor="middle" font-size="10" font-weight="600" fill="#8a8a96">grounded answer</text>

  <!-- reference note -->
  <rect x="260" y="556" width="790" height="92" rx="12" fill="#0c0c12" stroke="#24242e" stroke-width="1" />
  <text x="284" y="586" font-size="13" font-weight="600" fill="#e9e7ff">Composed, not baked in</text>
  <text x="284" y="612" font-size="11" font-weight="500" fill="#9a9aa4">Every stage is a public Engram primitive. The LongMemEval harness — session diversification,</text>
  <text x="284" y="631" font-size="11" font-weight="500" fill="#9a9aa4">turn-window expansion, multi-call evidence ledger — is a reference implementation of this flow.</text>

  <!-- Footer -->
  <text x="640" y="724" text-anchor="middle" font-size="11" font-weight="600" fill="#55555f" letter-spacing="4" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">EVIDENCE FOR AGGREGATION</text>
</svg>
