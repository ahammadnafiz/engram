<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%" style="background-color:#fbfbfd;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <defs>
    <filter id="card" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="10" flood-color="#1d1d1f" flood-opacity="0.045" />
    </filter>
  </defs>

  <rect width="1280" height="720" fill="#fbfbfd" />

  <!-- Header -->
  <text x="40" y="58" font-size="31" font-weight="700" fill="#1d1d1f" letter-spacing="-0.6">Engram — accuracy, cost, and context</text>
  <text x="40" y="87" font-size="15" font-weight="400" fill="#6e6e73">Three long-term memory benchmarks · add_batch() ingest, zero LLM calls at write · 2026-06-22</text>

  <!-- HERO: cost -->
  <rect x="40" y="116" width="592" height="348" rx="22" fill="#ffffff" stroke="#e8e8ed" stroke-width="1" filter="url(#card)" />
  <text x="76" y="161" font-size="11.5" font-weight="600" fill="#4f46e5" letter-spacing="1.4">COST PER QUESTION</text>
  <text x="76" y="261" font-size="92" font-weight="700" fill="#1d1d1f" letter-spacing="-3">22&#215;</text>
  <text x="76" y="300" font-size="19" font-weight="600" fill="#1d1d1f">cheaper than sending the full conversation</text>
  <text x="76" y="324" font-size="15" font-weight="400" fill="#6e6e73">BEAM 1M, measured against a no-retrieval baseline</text>

  <text x="76" y="365" font-size="13" font-weight="500" fill="#6e6e73">Full conversation as context</text>
  <rect x="76" y="373" width="440" height="14" rx="7" fill="#eeeef2" />
  <rect x="76" y="373" width="440" height="14" rx="7" fill="#d2d2d7" />
  <text x="528" y="385" font-size="14" font-weight="600" fill="#1d1d1f">$3.13 / q</text>

  <text x="76" y="413" font-size="13" font-weight="500" fill="#6e6e73">Engram, evidence block only</text>
  <rect x="76" y="421" width="440" height="14" rx="7" fill="#eeeef2" />
  <rect x="76" y="421" width="24" height="14" rx="7" fill="#4f46e5" />
  <text x="528" y="433" font-size="14" font-weight="700" fill="#4f46e5">$0.14 / q</text>

  <!-- CONTEXT (wide) -->
  <rect x="652" y="116" width="588" height="164" rx="22" fill="#ffffff" stroke="#e8e8ed" stroke-width="1" filter="url(#card)" />
  <text x="688" y="159" font-size="11.5" font-weight="600" fill="#4f46e5" letter-spacing="1.4">CONTEXT PER QUESTION</text>
  <text x="688" y="219" font-size="48" font-weight="700" fill="#1d1d1f" letter-spacing="-1.2">96.3% less</text>
  <text x="688" y="251" font-size="16" font-weight="400" fill="#6e6e73">1,033,243 raw tokens distilled to 38,719 evidence tokens</text>

  <!-- COMPRESSION 27x -->
  <rect x="652" y="300" width="284" height="164" rx="22" fill="#ffffff" stroke="#e8e8ed" stroke-width="1" filter="url(#card)" />
  <text x="688" y="343" font-size="11.5" font-weight="600" fill="#4f46e5" letter-spacing="1.4">COMPRESSION</text>
  <text x="688" y="407" font-size="58" font-weight="700" fill="#1d1d1f" letter-spacing="-1.5">27&#215;</text>
  <text x="688" y="439" font-size="15" font-weight="400" fill="#6e6e73">context reduction</text>

  <!-- WRITE PATH $0 -->
  <rect x="956" y="300" width="284" height="164" rx="22" fill="#ffffff" stroke="#e8e8ed" stroke-width="1" filter="url(#card)" />
  <text x="992" y="343" font-size="11.5" font-weight="600" fill="#4f46e5" letter-spacing="1.4">WRITE PATH</text>
  <text x="992" y="407" font-size="58" font-weight="700" fill="#1d1d1f" letter-spacing="-1.5">$0</text>
  <text x="992" y="439" font-size="15" font-weight="400" fill="#6e6e73">ingest cost · on-device</text>

  <!-- Bottom: accuracy trio -->
  <rect x="40" y="484" width="387" height="172" rx="22" fill="#ffffff" stroke="#e8e8ed" stroke-width="1" filter="url(#card)" />
  <text x="76" y="527" font-size="11.5" font-weight="600" fill="#4f46e5" letter-spacing="1.2">LONGMEMEVAL-S · 500 Q</text>
  <text x="76" y="595" font-size="54" font-weight="700" fill="#1d1d1f" letter-spacing="-1.5">90.6%</text>
  <text x="76" y="629" font-size="13" font-weight="400" fill="#6e6e73">isolated haystacks · ICLR 2025</text>

  <rect x="447" y="484" width="387" height="172" rx="22" fill="#ffffff" stroke="#e8e8ed" stroke-width="1" filter="url(#card)" />
  <text x="483" y="527" font-size="11.5" font-weight="600" fill="#4f46e5" letter-spacing="1.2">LOCOMO-10 · 1,540 Q</text>
  <text x="483" y="595" font-size="54" font-weight="700" fill="#1d1d1f" letter-spacing="-1.5">93.6%</text>
  <text x="483" y="629" font-size="13" font-weight="400" fill="#6e6e73">10 long conversations · ACL 2024</text>

  <rect x="854" y="484" width="386" height="172" rx="22" fill="#ffffff" stroke="#e8e8ed" stroke-width="1" filter="url(#card)" />
  <text x="890" y="527" font-size="11.5" font-weight="600" fill="#4f46e5" letter-spacing="1.2">BEAM 1M · 700 Q</text>
  <text x="890" y="595" font-size="54" font-weight="700" fill="#1d1d1f" letter-spacing="-1.5">81.9%</text>
  <text x="890" y="629" font-size="13" font-weight="400" fill="#6e6e73">1M-token scale · ICLR 2026</text>

  <!-- Footer -->
  <text x="640" y="697" text-anchor="middle" font-size="11" font-weight="500" fill="#86868b" letter-spacing="0.4">Composer claude-sonnet-4-6 · Judge claude-opus-4-8 · on-device embeddings · reproducible in benchmark/</text>
</svg>
