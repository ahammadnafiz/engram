<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%" style="background-color:#060608;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <defs>
    <linearGradient id="heroGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1a15" />
      <stop offset="1" stop-color="#0e0e13" />
    </linearGradient>
    <linearGradient id="ctxGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d141f" />
      <stop offset="1" stop-color="#0e0e13" />
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="#060608" />
  <rect x="40" y="0" width="64" height="4" rx="2" fill="#6d5dfb" />

  <!-- Header -->
  <text x="40" y="58" font-size="30" font-weight="800" fill="#fbfbfd" letter-spacing="-0.5">Engram — accuracy, cost, and context</text>
  <text x="40" y="86" font-size="14" font-weight="400" fill="#8a8a96">Three long-term memory benchmarks · add_batch() ingest, zero LLM calls at write · 2026-06-22</text>

  <!-- HERO: cost -->
  <rect x="40" y="112" width="592" height="352" rx="18" fill="url(#heroGlow)" stroke="#24242e" stroke-width="1" />
  <text x="72" y="156" font-size="11" font-weight="700" fill="#5f8f72" letter-spacing="2" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">COST PER QUESTION</text>
  <text x="72" y="256" font-size="90" font-weight="800" fill="#34d399" letter-spacing="-2">22&#215;</text>
  <text x="72" y="296" font-size="18" font-weight="500" fill="#c7c7d1">cheaper than feeding the full conversation in (BEAM 1M)</text>

  <text x="72" y="344" font-size="12" font-weight="500" fill="#9a9aa3">Full conversation as context</text>
  <rect x="72" y="352" width="488" height="22" rx="5" fill="#1a1a20" />
  <rect x="72" y="352" width="488" height="22" rx="5" fill="#2c2c36" />
  <text x="568" y="369" font-size="13" font-weight="700" fill="#f1f1f4">$3.13 / q</text>

  <text x="72" y="402" font-size="12" font-weight="500" fill="#9a9aa3">Engram (evidence block only)</text>
  <rect x="72" y="410" width="488" height="22" rx="5" fill="#1a1a20" />
  <rect x="72" y="410" width="22" height="22" rx="5" fill="#34d399" />
  <text x="104" y="427" font-size="13" font-weight="700" fill="#34d399">$0.14 / q</text>

  <text x="72" y="450" font-size="11" font-weight="400" fill="#6e6e79">Composer only, Anthropic list price. Ingest is free — embeddings run on-device.</text>

  <!-- CONTEXT (big) -->
  <rect x="650" y="112" width="590" height="167" rx="18" fill="url(#ctxGlow)" stroke="#24242e" stroke-width="1" />
  <text x="682" y="152" font-size="11" font-weight="700" fill="#5b7aa8" letter-spacing="2" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">CONTEXT PER QUESTION</text>
  <text x="682" y="212" font-size="46" font-weight="800" fill="#4f8ef7" letter-spacing="-1">96.3% less</text>
  <text x="682" y="248" font-size="15" font-weight="500" fill="#c7c7d1">1,033,243 raw tokens distilled to 38,719 evidence tokens</text>

  <!-- COMPRESSION 27x -->
  <rect x="650" y="297" width="286" height="167" rx="18" fill="#0e0e13" stroke="#24242e" stroke-width="1" />
  <text x="682" y="337" font-size="11" font-weight="700" fill="#6e6e79" letter-spacing="2" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">COMPRESSION</text>
  <text x="682" y="400" font-size="58" font-weight="800" fill="#8b7bf0" letter-spacing="-1">27&#215;</text>
  <text x="682" y="432" font-size="14" font-weight="500" fill="#9a9aa3">context reduction</text>

  <!-- WRITE PATH $0 -->
  <rect x="954" y="297" width="286" height="167" rx="18" fill="#0e0e13" stroke="#24242e" stroke-width="1" />
  <text x="986" y="337" font-size="11" font-weight="700" fill="#6e6e79" letter-spacing="2" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">WRITE PATH</text>
  <text x="986" y="400" font-size="58" font-weight="800" fill="#34d399" letter-spacing="-1">$0</text>
  <text x="986" y="432" font-size="14" font-weight="500" fill="#9a9aa3">ingest cost · on-device</text>

  <!-- Bottom: accuracy trio -->
  <rect x="40" y="482" width="388" height="172" rx="18" fill="#0e0e13" stroke="#24242e" stroke-width="1" />
  <text x="72" y="524" font-size="11" font-weight="700" fill="#5b7aa8" letter-spacing="1.5" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">LONGMEMEVAL-S · 500 Q</text>
  <text x="72" y="592" font-size="52" font-weight="800" fill="#4f8ef7" letter-spacing="-1">90.6%</text>
  <text x="72" y="626" font-size="12.5" font-weight="500" fill="#9a9aa3">isolated haystacks · ICLR 2025</text>

  <rect x="446" y="482" width="388" height="172" rx="18" fill="#0e0e13" stroke="#24242e" stroke-width="1" />
  <text x="478" y="524" font-size="11" font-weight="700" fill="#7a6fb0" letter-spacing="1.5" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">LOCOMO-10 · 1,540 Q</text>
  <text x="478" y="592" font-size="52" font-weight="800" fill="#8b7bf0" letter-spacing="-1">93.6%</text>
  <text x="478" y="626" font-size="12.5" font-weight="500" fill="#9a9aa3">10 long conversations · ACL 2024</text>

  <rect x="852" y="482" width="388" height="172" rx="18" fill="#0e0e13" stroke="#24242e" stroke-width="1" />
  <text x="884" y="524" font-size="11" font-weight="700" fill="#5f8f72" letter-spacing="1.5" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">BEAM 1M · 700 Q</text>
  <text x="884" y="592" font-size="52" font-weight="800" fill="#34d399" letter-spacing="-1">81.9%</text>
  <text x="884" y="626" font-size="12.5" font-weight="500" fill="#9a9aa3">1M-token scale · ICLR 2026</text>

  <!-- Footer -->
  <text x="640" y="700" text-anchor="middle" font-size="10.5" font-weight="600" fill="#55555f" letter-spacing="2.5" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">COMPOSER CLAUDE-SONNET-4-6 · JUDGE CLAUDE-OPUS-4-8 · ON-DEVICE EMBEDDINGS · REPRODUCIBLE IN benchmark/</text>
</svg>
