<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 768" width="100%" height="100%" style="background-color:#060608;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <defs>
    <marker id="arrLi" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0 1.5 L8.5 5 L0 8.5" fill="none" stroke="#4a4a55" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" />
    </marker>
  </defs>

  <rect width="1280" height="768" fill="#060608" />
  <rect x="592" y="0" width="96" height="4" rx="2" fill="#6d5dfb" />

  <!-- Header -->
  <text x="640" y="92" text-anchor="middle" font-size="46" font-weight="800" fill="#fbfbfd" letter-spacing="-0.5">Source-anchored long input</text>
  <text x="640" y="132" text-anchor="middle" font-size="16" font-weight="400" fill="#8a8a96">A large document is stored verbatim, split into heading-aware chunks, then distilled into memories that</text>
  <text x="640" y="156" text-anchor="middle" font-size="16" font-weight="400" fill="#8a8a96">carry exact anchors — chunk id, character span, and content hash — so every answer is citable.</text>

  <!-- Panel -->
  <rect x="48" y="188" width="1184" height="566" rx="20" fill="#0b0b0f" stroke="#1c1c24" stroke-width="1" />

  <!-- Stage connectors -->
  <line x1="310" y1="298" x2="381" y2="298" stroke="#3a3a44" stroke-width="1.4" marker-end="url(#arrLi)" />
  <line x1="605" y1="298" x2="676" y2="298" stroke="#3a3a44" stroke-width="1.4" marker-end="url(#arrLi)" />
  <line x1="900" y1="298" x2="971" y2="298" stroke="#3a3a44" stroke-width="1.4" marker-end="url(#arrLi)" />

  <!-- Stage boxes -->
  <rect x="90" y="256" width="220" height="84" rx="8" fill="#0e0e13" stroke="#292932" stroke-width="1" />
  <text x="200" y="288" text-anchor="middle" font-size="15" font-weight="600" fill="#f1f1f4">record_long_input</text>
  <text x="200" y="307" text-anchor="middle" font-size="9" font-weight="500" fill="#6e6e79" letter-spacing="0.8" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">RAW SOURCE EVENT</text>
  <text x="200" y="323" text-anchor="middle" font-size="8" font-weight="500" fill="#5c5c66" letter-spacing="0.8" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">STORED VERBATIM</text>

  <rect x="383" y="256" width="220" height="84" rx="8" fill="#0e0e13" stroke="#292932" stroke-width="1" />
  <text x="493" y="288" text-anchor="middle" font-size="15" font-weight="600" fill="#f1f1f4">Chunk</text>
  <text x="493" y="307" text-anchor="middle" font-size="9" font-weight="500" fill="#6e6e79" letter-spacing="0.8" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">HEADING + TOKEN BUDGET</text>
  <text x="493" y="323" text-anchor="middle" font-size="8" font-weight="500" fill="#5c5c66" letter-spacing="0.8" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">CLASSIFY KIND · ARTIFACT EVENTS</text>

  <rect x="676" y="256" width="226" height="84" rx="8" fill="#11101d" stroke="#3a3469" stroke-width="1.2" />
  <text x="789" y="288" text-anchor="middle" font-size="15" font-weight="600" fill="#eceaff">Anchor + Extract</text>
  <text x="789" y="307" text-anchor="middle" font-size="9" font-weight="500" fill="#8b85c4" letter-spacing="0.8" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">LLM OR HEURISTIC FACTS</text>
  <text x="789" y="323" text-anchor="middle" font-size="8" font-weight="500" fill="#6f699c" letter-spacing="0.8" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">char_start · char_end · quote_hash</text>

  <rect x="973" y="256" width="216" height="84" rx="8" fill="#0e0e13" stroke="#292932" stroke-width="1" />
  <text x="1081" y="288" text-anchor="middle" font-size="15" font-weight="600" fill="#f1f1f4">Manifest + Context</text>
  <text x="1081" y="307" text-anchor="middle" font-size="9" font-weight="500" fill="#6e6e79" letter-spacing="0.8" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">CHECKPOINT MANIFEST</text>
  <text x="1081" y="323" text-anchor="middle" font-size="8" font-weight="500" fill="#5c5c66" letter-spacing="0.8" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">build_long_input_context()</text>

  <!-- writes-to label -->
  <line x1="640" y1="354" x2="640" y2="396" stroke="#3a3a44" stroke-width="1.3" stroke-dasharray="2 4" />
  <rect x="594" y="362" width="92" height="16" fill="#0b0b0f" />
  <text x="640" y="374" text-anchor="middle" font-size="9" font-weight="500" fill="#6e6e79" letter-spacing="2" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">PERSISTS</text>

  <!-- storage band -->
  <rect x="300" y="406" width="680" height="218" rx="14" fill="#0c0c12" stroke="#24242e" stroke-width="1" />

  <rect x="318" y="430" width="205" height="148" rx="9" fill="#0e1830" stroke="#2a4a82" stroke-width="1" />
  <text x="420" y="478" text-anchor="middle" font-size="13" font-weight="600" fill="#eef2fb">Source + Chunks</text>
  <text x="420" y="498" text-anchor="middle" font-size="8" font-weight="500" fill="#7f93bf" letter-spacing="0.5" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">AGENT_EVENTS</text>
  <text x="420" y="528" text-anchor="middle" font-size="8" font-weight="500" fill="#6f84ad" letter-spacing="0.4" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">raw text · artifact chunks</text>

  <rect x="538" y="430" width="205" height="148" rx="9" fill="#0c1326" stroke="#223e72" stroke-width="1" />
  <text x="640" y="478" text-anchor="middle" font-size="13" font-weight="600" fill="#e9eefb">Anchored Facts</text>
  <text x="640" y="498" text-anchor="middle" font-size="8" font-weight="500" fill="#7388b6" letter-spacing="0.5" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">AGENT_MEMORY</text>
  <text x="640" y="528" text-anchor="middle" font-size="8" font-weight="500" fill="#6f84ad" letter-spacing="0.4" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">source_event_id · char span</text>

  <rect x="757" y="430" width="205" height="148" rx="9" fill="#1d1810" stroke="#5f4a1e" stroke-width="1" />
  <text x="859" y="478" text-anchor="middle" font-size="13" font-weight="600" fill="#f6efdd">Manifest</text>
  <text x="859" y="498" text-anchor="middle" font-size="8" font-weight="500" fill="#b59a5e" letter-spacing="0.5" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">AGENT_CHECKPOINTS</text>
  <text x="859" y="528" text-anchor="middle" font-size="8" font-weight="500" fill="#a07f3e" letter-spacing="0.4" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">chunk map · counts</text>

  <text x="640" y="602" text-anchor="middle" font-size="9" font-weight="600" fill="#6e6e79" letter-spacing="1.5" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">SOURCE CHUNKS OUTRANK SUMMARIES FOR EXACT-DOCUMENT ANSWERS</text>

  <!-- Footer -->
  <text x="640" y="724" text-anchor="middle" font-size="11" font-weight="600" fill="#55555f" letter-spacing="4" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">SOURCE-ANCHORED LONG INPUT</text>
</svg>
