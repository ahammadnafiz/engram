<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 768" width="100%" height="100%" style="background-color:#060608;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <defs>
    <marker id="arrA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0 1.5 L8.5 5 L0 8.5" fill="none" stroke="#4a4a55" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" />
    </marker>
    <g id="dbiconA" fill="none" stroke="currentColor" stroke-width="1.5">
      <ellipse cx="0" cy="-7" rx="10" ry="3.8" />
      <path d="M-10 -7 V7" />
      <path d="M10 -7 V7" />
      <path d="M-10 7 a10 3.8 0 0 0 20 0" />
      <path d="M-10 0 a10 3.8 0 0 0 20 0" />
    </g>
  </defs>

  <rect width="1280" height="768" fill="#060608" />
  <rect x="592" y="0" width="96" height="4" rx="2" fill="#6d5dfb" />

  <!-- Header -->
  <text x="640" y="92" text-anchor="middle" font-size="46" font-weight="800" fill="#fbfbfd" letter-spacing="-0.5">System architecture</text>
  <text x="640" y="132" text-anchor="middle" font-size="16" font-weight="400" fill="#8a8a96">One async client fans across composable core services, each backed by a single PostgreSQL store —</text>
  <text x="640" y="156" text-anchor="middle" font-size="16" font-weight="400" fill="#8a8a96">vector, full-text, and graph live in one engine. Embedding is pluggable; the LLM is optional.</text>

  <!-- Panel -->
  <rect x="48" y="188" width="1184" height="566" rx="20" fill="#0b0b0f" stroke="#1c1c24" stroke-width="1" />

  <!-- Tier 1: Application API -->
  <rect x="72" y="222" width="1136" height="88" rx="12" fill="#0c0c12" stroke="#24242e" stroke-width="1" />
  <text x="90" y="244" font-size="11" font-weight="600" fill="#b6b2e8" letter-spacing="2.2" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">APPLICATION API · ENGRAM ASYNC CLIENT</text>

  <rect x="90" y="256" width="242" height="44" rx="8" fill="#0e0e13" stroke="#292932" stroke-width="1" />
  <text x="211" y="278" text-anchor="middle" font-size="14" font-weight="600" fill="#f1f1f4">Memory</text>
  <text x="211" y="292" text-anchor="middle" font-size="8" font-weight="500" fill="#6e6e79" letter-spacing="0.8" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">ADD · REVISE · SEARCH</text>

  <rect x="376" y="256" width="242" height="44" rx="8" fill="#0e0e13" stroke="#292932" stroke-width="1" />
  <text x="497" y="278" text-anchor="middle" font-size="14" font-weight="600" fill="#f1f1f4">Recall</text>
  <text x="497" y="292" text-anchor="middle" font-size="8" font-weight="500" fill="#6e6e79" letter-spacing="0.8" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">QUESTION → ANSWER</text>

  <rect x="662" y="256" width="242" height="44" rx="8" fill="#0e0e13" stroke="#292932" stroke-width="1" />
  <text x="783" y="278" text-anchor="middle" font-size="14" font-weight="600" fill="#f1f1f4">Graph</text>
  <text x="783" y="292" text-anchor="middle" font-size="8" font-weight="500" fill="#6e6e79" letter-spacing="0.8" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">RELATE · TRAVERSE</text>

  <rect x="948" y="256" width="242" height="44" rx="8" fill="#0e0e13" stroke="#292932" stroke-width="1" />
  <text x="1069" y="278" text-anchor="middle" font-size="14" font-weight="600" fill="#f1f1f4">Task &amp; Session</text>
  <text x="1069" y="292" text-anchor="middle" font-size="8" font-weight="500" fill="#6e6e79" letter-spacing="0.8" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">EVENTS · CHECKPOINTS</text>

  <!-- connector tier1 -> tier2 -->
  <line x1="640" y1="310" x2="640" y2="332" stroke="#3a3a44" stroke-width="1.4" marker-end="url(#arrA)" />

  <!-- Tier 2: Core services -->
  <rect x="72" y="332" width="1136" height="168" rx="12" fill="#0c0c12" stroke="#24242e" stroke-width="1" />
  <text x="90" y="354" font-size="11" font-weight="600" fill="#b6b2e8" letter-spacing="2.2" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">CORE SERVICES · WIRED ON connect()</text>

  <!-- row 1 -->
  <rect x="90" y="366" width="242" height="50" rx="8" fill="#15132c" stroke="#3a3469" stroke-width="1" />
  <text x="211" y="389" text-anchor="middle" font-size="13" font-weight="600" fill="#e9e7ff">Embedding Service</text>
  <text x="211" y="404" text-anchor="middle" font-size="8" font-weight="500" fill="#8b85c4" letter-spacing="0.8" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">PLUGGABLE VECTOR PROVIDER</text>

  <rect x="376" y="366" width="242" height="50" rx="8" fill="#15132c" stroke="#3a3469" stroke-width="1" />
  <text x="497" y="389" text-anchor="middle" font-size="13" font-weight="600" fill="#e9e7ff">Memory Store</text>
  <text x="497" y="404" text-anchor="middle" font-size="8" font-weight="500" fill="#8b85c4" letter-spacing="0.8" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">CRUD · LINEAGE · DEDUP · SEARCH</text>

  <rect x="662" y="366" width="242" height="50" rx="8" fill="#15132c" stroke="#3a3469" stroke-width="1" />
  <text x="783" y="389" text-anchor="middle" font-size="13" font-weight="600" fill="#e9e7ff">Recall Operator</text>
  <text x="783" y="404" text-anchor="middle" font-size="8" font-weight="500" fill="#8b85c4" letter-spacing="0.8" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">INTENT ROUTING · COMPOSE</text>

  <rect x="948" y="366" width="242" height="50" rx="8" fill="#0e0e13" stroke="#292932" stroke-width="1" />
  <text x="1069" y="389" text-anchor="middle" font-size="13" font-weight="600" fill="#f1f1f4">LLM Service</text>
  <text x="1069" y="404" text-anchor="middle" font-size="8" font-weight="500" fill="#6e6e79" letter-spacing="0.8" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">OPTIONAL · EXTRACT · COMPOSE</text>

  <!-- row 2 -->
  <rect x="90" y="428" width="242" height="50" rx="8" fill="#15132c" stroke="#3a3469" stroke-width="1" />
  <text x="211" y="451" text-anchor="middle" font-size="13" font-weight="600" fill="#e9e7ff">Graph Traversal</text>
  <text x="211" y="466" text-anchor="middle" font-size="8" font-weight="500" fill="#8b85c4" letter-spacing="0.8" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">RECURSIVE CTE · MULTI-HOP</text>

  <rect x="376" y="428" width="242" height="50" rx="8" fill="#0e0e13" stroke="#292932" stroke-width="1" />
  <text x="497" y="451" text-anchor="middle" font-size="13" font-weight="600" fill="#f1f1f4">Reranker</text>
  <text x="497" y="466" text-anchor="middle" font-size="8" font-weight="500" fill="#6e6e79" letter-spacing="0.8" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">LAZY CROSS-ENCODER</text>

  <rect x="662" y="428" width="242" height="50" rx="8" fill="#15132c" stroke="#3a3469" stroke-width="1" />
  <text x="783" y="451" text-anchor="middle" font-size="13" font-weight="600" fill="#e9e7ff">Task Memory</text>
  <text x="783" y="466" text-anchor="middle" font-size="8" font-weight="500" fill="#8b85c4" letter-spacing="0.8" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">EVENT LEDGER · CHECKPOINTS</text>

  <rect x="948" y="428" width="242" height="50" rx="8" fill="#15132c" stroke="#3a3469" stroke-width="1" />
  <text x="1069" y="451" text-anchor="middle" font-size="13" font-weight="600" fill="#e9e7ff">Session · Health</text>
  <text x="1069" y="466" text-anchor="middle" font-size="8" font-weight="500" fill="#8b85c4" letter-spacing="0.8" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">ROLLING SUMMARY · PROBES</text>

  <!-- connector tier2 -> storage -->
  <line x1="640" y1="500" x2="640" y2="520" stroke="#3a3a44" stroke-width="1.4" marker-end="url(#arrA)" />

  <!-- Tier 3: Storage -->
  <rect x="290" y="520" width="700" height="174" rx="14" fill="#0c0c12" stroke="#24242e" stroke-width="1" />
  <text x="640" y="544" text-anchor="middle" font-size="10" font-weight="600" fill="#6e6e79" letter-spacing="2" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">POSTGRES STORAGE · ASYNCPG POOL</text>

  <rect x="308" y="556" width="206" height="104" rx="9" fill="#0e1830" stroke="#2a4a82" stroke-width="1" />
  <use href="#dbiconA" transform="translate(411,582)" color="#9fb6e6" />
  <text x="411" y="620" text-anchor="middle" font-size="13.5" font-weight="600" fill="#eef2fb">Fact + Lineage</text>
  <text x="411" y="638" text-anchor="middle" font-size="8" font-weight="500" fill="#7f93bf" letter-spacing="0.6" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">AGENT_MEMORY · LINEAGES</text>

  <rect x="537" y="556" width="206" height="104" rx="9" fill="#0c1326" stroke="#223e72" stroke-width="1" />
  <use href="#dbiconA" transform="translate(640,582)" color="#8aa0d6" />
  <text x="640" y="620" text-anchor="middle" font-size="13.5" font-weight="600" fill="#e9eefb">Vector Index</text>
  <text x="640" y="638" text-anchor="middle" font-size="8.5" font-weight="500" fill="#7388b6" letter-spacing="0.8" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">PGVECTOR · HNSW</text>

  <rect x="766" y="556" width="206" height="104" rx="9" fill="#1d1810" stroke="#5f4a1e" stroke-width="1" />
  <use href="#dbiconA" transform="translate(869,582)" color="#d8b765" />
  <text x="869" y="620" text-anchor="middle" font-size="13.5" font-weight="600" fill="#f6efdd">Text + Graph</text>
  <text x="869" y="638" text-anchor="middle" font-size="8" font-weight="500" fill="#b59a5e" letter-spacing="0.5" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">PG_TRGM · TSV · RELATIONS</text>

  <text x="640" y="682" text-anchor="middle" font-size="10" font-weight="500" fill="#6e6e79" letter-spacing="2" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">POSTGRESQL · ONE STORE, MANY SUBSTRATES</text>

  <!-- Footer -->
  <text x="640" y="728" text-anchor="middle" font-size="11" font-weight="600" fill="#55555f" letter-spacing="4" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">SYSTEM ARCHITECTURE</text>
</svg>
