<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 768" width="100%" height="100%" style="background-color:#060608;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <defs>
    <marker id="arrL" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0 1.5 L8.5 5 L0 8.5" fill="none" stroke="#4a4a55" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" />
    </marker>
    <marker id="arrLg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 1.5 L8.5 5 L0 8.5" fill="none" stroke="#7f6b3a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
    </marker>
  </defs>

  <rect width="1280" height="768" fill="#060608" />
  <rect x="592" y="0" width="96" height="4" rx="2" fill="#6d5dfb" />

  <!-- Header -->
  <text x="640" y="92" text-anchor="middle" font-size="46" font-weight="800" fill="#fbfbfd" letter-spacing="-0.5">Lineage &amp; supersession</text>
  <text x="640" y="132" text-anchor="middle" font-size="16" font-weight="400" fill="#8a8a96">A correction never overwrites. Each new revision joins the same lineage, retires prior heads as superseded,</text>
  <text x="640" y="156" text-anchor="middle" font-size="16" font-weight="400" fill="#8a8a96">and records a supersedes edge — so the current fact is fast to read and the full history stays auditable.</text>

  <!-- Panel -->
  <rect x="48" y="188" width="1184" height="566" rx="20" fill="#0b0b0f" stroke="#1c1c24" stroke-width="1" />

  <!-- lineage head pointer -->
  <rect x="430" y="226" width="420" height="46" rx="10" fill="#0c0c12" stroke="#24242e" stroke-width="1" />
  <text x="640" y="248" text-anchor="middle" font-size="12.5" font-weight="600" fill="#cfcfd6">memory_lineages.current_memory_id</text>
  <text x="640" y="263" text-anchor="middle" font-size="8" font-weight="500" fill="#6e6e79" letter-spacing="1.5" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">SINGLE ACTIVE HEAD PER LINEAGE</text>

  <!-- revision lane labels -->
  <text x="178" y="330" font-size="9" font-weight="600" fill="#6e6e79" letter-spacing="2" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">REVISION CHAIN · ONE lineage_id</text>

  <!-- revision 1 (superseded) -->
  <rect x="96" y="344" width="300" height="116" rx="11" fill="#101015" stroke="#2a2a33" stroke-width="1" />
  <rect x="112" y="360" width="86" height="22" rx="11" fill="#1a1a22" stroke="#33333d" stroke-width="1" />
  <text x="155" y="375" text-anchor="middle" font-size="9" font-weight="600" fill="#8a8a96" letter-spacing="1" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">SUPERSEDED</text>
  <text x="350" y="376" text-anchor="end" font-size="11" font-weight="700" fill="#6e6e79" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">rev 1</text>
  <text x="112" y="408" font-size="13.5" font-weight="500" fill="#9a9aa4">“Budget is $5k”</text>
  <text x="112" y="436" font-size="8.5" font-weight="500" fill="#5c5c66" letter-spacing="0.5" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">valid_from → valid_to · superseded_by ↗</text>

  <!-- revision 2 (superseded) -->
  <rect x="490" y="344" width="300" height="116" rx="11" fill="#101015" stroke="#2a2a33" stroke-width="1" />
  <rect x="506" y="360" width="86" height="22" rx="11" fill="#1a1a22" stroke="#33333d" stroke-width="1" />
  <text x="549" y="375" text-anchor="middle" font-size="9" font-weight="600" fill="#8a8a96" letter-spacing="1" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">SUPERSEDED</text>
  <text x="744" y="376" text-anchor="end" font-size="11" font-weight="700" fill="#6e6e79" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">rev 2</text>
  <text x="506" y="408" font-size="13.5" font-weight="500" fill="#9a9aa4">“Budget is $50k”</text>
  <text x="506" y="436" font-size="8.5" font-weight="500" fill="#5c5c66" letter-spacing="0.5" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">valid_from → valid_to · superseded_by ↗</text>

  <!-- revision 3 (active head) -->
  <rect x="884" y="344" width="300" height="116" rx="11" fill="#11101d" stroke="#3a3469" stroke-width="1.4" />
  <rect x="900" y="360" width="68" height="22" rx="11" fill="#1d1a3a" stroke="#4b4488" stroke-width="1" />
  <text x="934" y="375" text-anchor="middle" font-size="9" font-weight="600" fill="#b6b2e8" letter-spacing="1" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">ACTIVE</text>
  <text x="1138" y="376" text-anchor="end" font-size="11" font-weight="700" fill="#b6b2e8" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">rev 3</text>
  <text x="900" y="408" font-size="13.5" font-weight="600" fill="#eceaff">“Budget is $120k”</text>
  <text x="900" y="436" font-size="8.5" font-weight="500" fill="#8b85c4" letter-spacing="0.5" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">valid_from · valid_to = NULL · status = active</text>

  <!-- forward revision arrows -->
  <line x1="396" y1="402" x2="490" y2="402" stroke="#3a3a44" stroke-width="1.4" marker-end="url(#arrL)" />
  <line x1="790" y1="402" x2="884" y2="402" stroke="#3a3a44" stroke-width="1.4" marker-end="url(#arrL)" />

  <!-- head pointer to rev3 -->
  <line x1="850" y1="252" x2="1034" y2="340" stroke="#4b4488" stroke-width="1.4" stroke-dasharray="3 3" marker-end="url(#arrL)" />

  <!-- supersedes edges (gold) from rev3 back to rev2 and rev1 -->
  <path d="M1010 460 C 1010 540, 640 552, 640 478" fill="none" stroke="#7f6b3a" stroke-width="1.5" marker-end="url(#arrLg)" />
  <path d="M1010 460 C 1010 600, 246 600, 246 478" fill="none" stroke="#7f6b3a" stroke-width="1.5" marker-end="url(#arrLg)" />
  <rect x="556" y="556" width="168" height="20" fill="#0b0b0f" />
  <text x="640" y="570" text-anchor="middle" font-size="9" font-weight="600" fill="#b59a5e" letter-spacing="1.5" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">supersedes EDGES</text>

  <!-- read-surface footnote panel -->
  <rect x="96" y="624" width="540" height="74" rx="11" fill="#0c0c12" stroke="#24242e" stroke-width="1" />
  <text x="116" y="650" font-size="11.5" font-weight="600" fill="#e9e7ff">Active recall</text>
  <text x="116" y="672" font-size="10" font-weight="500" fill="#8a8a96">search() · recall() · list_recent() — see the head only</text>
  <text x="116" y="689" font-size="8.5" font-weight="500" fill="#6e6e79" letter-spacing="0.5" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">SUPERSEDED ROWS FILTERED OUT BY DEFAULT</text>

  <rect x="644" y="624" width="540" height="74" rx="11" fill="#0c0c12" stroke="#24242e" stroke-width="1" />
  <text x="664" y="650" font-size="11.5" font-weight="600" fill="#d8b765">Audit &amp; history</text>
  <text x="664" y="672" font-size="10" font-weight="500" fill="#8a8a96">get_lineage() · get_history() · explain_memory()</text>
  <text x="664" y="689" font-size="8.5" font-weight="500" fill="#6e6e79" letter-spacing="0.5" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">EVERY REVISION VISIBLE, NEWEST FIRST</text>

  <!-- Footer -->
  <text x="640" y="730" text-anchor="middle" font-size="11" font-weight="600" fill="#55555f" letter-spacing="4" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">MEMORY LINEAGE &amp; SUPERSESSION</text>
</svg>
