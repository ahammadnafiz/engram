<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 768" width="100%" height="100%" style="background-color:#060608;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <defs>
    <marker id="arrS" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 1.5 L8.5 5 L0 8.5" fill="none" stroke="#4a4a55" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" />
    </marker>
  </defs>

  <rect width="1280" height="768" fill="#060608" />
  <rect x="592" y="0" width="96" height="4" rx="2" fill="#6d5dfb" />

  <!-- Header -->
  <text x="640" y="92" text-anchor="middle" font-size="46" font-weight="800" fill="#fbfbfd" letter-spacing="-0.5">Hybrid ranking</text>
  <text x="640" y="132" text-anchor="middle" font-size="16" font-weight="400" fill="#8a8a96">Vector and keyword branches each overfetch, then fuse by rank (RRF, k=60) rescaled onto a common 0–1 scale.</text>
  <text x="640" y="156" text-anchor="middle" font-size="16" font-weight="400" fill="#8a8a96">The remaining budget splits between recency decay and importance — weighted by memory type.</text>

  <!-- Panel -->
  <rect x="48" y="188" width="1184" height="566" rx="20" fill="#0b0b0f" stroke="#1c1c24" stroke-width="1" />

  <!-- two branches -->
  <rect x="80" y="226" width="300" height="76" rx="10" fill="#0c1326" stroke="#223e72" stroke-width="1" />
  <text x="230" y="256" text-anchor="middle" font-size="14" font-weight="600" fill="#e9eefb">Semantic branch</text>
  <text x="230" y="276" text-anchor="middle" font-size="9" font-weight="500" fill="#7388b6" letter-spacing="0.6" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">PGVECTOR · cosine = 1 − distance</text>
  <text x="230" y="291" text-anchor="middle" font-size="8" font-weight="500" fill="#5f739c" letter-spacing="0.5" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">OVERFETCH limit × multiplier (≥20)</text>

  <rect x="80" y="326" width="300" height="76" rx="10" fill="#1d1810" stroke="#5f4a1e" stroke-width="1" />
  <text x="230" y="356" text-anchor="middle" font-size="14" font-weight="600" fill="#f6efdd">Keyword branch</text>
  <text x="230" y="376" text-anchor="middle" font-size="9" font-weight="500" fill="#b59a5e" letter-spacing="0.6" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">FULL-TEXT · ts_rank(fact_tsv)</text>
  <text x="230" y="391" text-anchor="middle" font-size="8" font-weight="500" fill="#8a7338" letter-spacing="0.5" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">OVERFETCH limit × multiplier (≥20)</text>

  <!-- RRF fuse -->
  <line x1="380" y1="264" x2="436" y2="300" stroke="#3a3a44" stroke-width="1.4" marker-end="url(#arrS)" />
  <line x1="380" y1="364" x2="436" y2="328" stroke="#3a3a44" stroke-width="1.4" marker-end="url(#arrS)" />

  <rect x="438" y="282" width="220" height="64" rx="10" fill="#11101d" stroke="#3a3469" stroke-width="1.2" />
  <text x="548" y="309" text-anchor="middle" font-size="14" font-weight="600" fill="#eceaff">Reciprocal Rank Fusion</text>
  <text x="548" y="328" text-anchor="middle" font-size="9.5" font-weight="500" fill="#8b85c4" letter-spacing="0.4" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">1 / (60 + rank) per branch</text>

  <!-- rescale -->
  <line x1="658" y1="314" x2="700" y2="314" stroke="#3a3a44" stroke-width="1.4" marker-end="url(#arrS)" />
  <rect x="702" y="282" width="200" height="64" rx="10" fill="#0e0e13" stroke="#292932" stroke-width="1" />
  <text x="802" y="309" text-anchor="middle" font-size="14" font-weight="600" fill="#f1f1f4">Rescale × 30</text>
  <text x="802" y="328" text-anchor="middle" font-size="9" font-weight="500" fill="#6e6e79" letter-spacing="0.4" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">RRF → 0–1, comparable to cosine</text>

  <!-- combine into score -->
  <line x1="902" y1="314" x2="944" y2="314" stroke="#3a3a44" stroke-width="1.4" marker-end="url(#arrS)" />
  <rect x="946" y="270" width="246" height="88" rx="11" fill="#15132c" stroke="#3a3469" stroke-width="1.3" />
  <text x="1069" y="298" text-anchor="middle" font-size="13" font-weight="600" fill="#e9e7ff">Combined score</text>
  <text x="1069" y="320" text-anchor="middle" font-size="9.5" font-weight="600" fill="#cfc9f6" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">w_sem·sem + w_kw·kw</text>
  <text x="1069" y="338" text-anchor="middle" font-size="9.5" font-weight="600" fill="#cfc9f6" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">+ type·(decay, importance)</text>

  <!-- type-aware weighting block -->
  <text x="640" y="424" text-anchor="middle" font-size="9" font-weight="600" fill="#6e6e79" letter-spacing="2.5" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">REMAINING BUDGET (1 − w_sem − w_kw) · SPLIT BY MEMORY TYPE</text>

  <!-- durable -->
  <rect x="96" y="444" width="252" height="118" rx="11" fill="#0c0c12" stroke="#24242e" stroke-width="1" />
  <text x="116" y="472" font-size="13" font-weight="600" fill="#f1f1f4">Durable</text>
  <text x="116" y="492" font-size="8.5" font-weight="500" fill="#6e6e79" letter-spacing="0.4" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">constraint · preference · profile · decision</text>
  <text x="116" y="524" font-size="20" font-weight="700" fill="#9fb6e6" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">0.25</text>
  <text x="172" y="524" font-size="11" font-weight="500" fill="#6e6e79">decay</text>
  <text x="240" y="524" font-size="20" font-weight="700" fill="#cbb888" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">0.75</text>
  <text x="300" y="524" font-size="11" font-weight="500" fill="#6e6e79">imp</text>
  <text x="116" y="548" font-size="8.5" font-weight="500" fill="#5c5c66" letter-spacing="0.3" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">PIN BY IMPORTANCE, RESIST AGING</text>

  <!-- ephemeral -->
  <rect x="360" y="444" width="252" height="118" rx="11" fill="#0c0c12" stroke="#24242e" stroke-width="1" />
  <text x="380" y="472" font-size="13" font-weight="600" fill="#f1f1f4">Ephemeral</text>
  <text x="380" y="492" font-size="8.5" font-weight="500" fill="#6e6e79" letter-spacing="0.4" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">episodic 0.75 · tool_result 0.65</text>
  <text x="380" y="524" font-size="20" font-weight="700" fill="#9fb6e6" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">0.75</text>
  <text x="436" y="524" font-size="11" font-weight="500" fill="#6e6e79">decay</text>
  <text x="504" y="524" font-size="20" font-weight="700" fill="#cbb888" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">0.25</text>
  <text x="564" y="524" font-size="11" font-weight="500" fill="#6e6e79">imp</text>
  <text x="380" y="548" font-size="8.5" font-weight="500" fill="#5c5c66" letter-spacing="0.3" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">FRESHNESS WINS, FADES WITH TIME</text>

  <!-- default + decay formula -->
  <rect x="624" y="444" width="252" height="118" rx="11" fill="#0c0c12" stroke="#24242e" stroke-width="1" />
  <text x="644" y="472" font-size="13" font-weight="600" fill="#f1f1f4">Default</text>
  <text x="644" y="492" font-size="8.5" font-weight="500" fill="#6e6e79" letter-spacing="0.4" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">semantic · episodic-neutral types</text>
  <text x="644" y="524" font-size="13" font-weight="600" fill="#cfcfd6" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">w_decay · decay</text>
  <text x="644" y="544" font-size="13" font-weight="600" fill="#cfcfd6" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">+ w_imp · importance</text>

  <!-- decay law -->
  <rect x="888" y="444" width="296" height="118" rx="11" fill="#11101d" stroke="#3a3469" stroke-width="1.2" />
  <text x="908" y="472" font-size="13" font-weight="600" fill="#eceaff">Decay law</text>
  <text x="908" y="504" font-size="17" font-weight="700" fill="#cfc9f6" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">decay = rate ^ hours</text>
  <text x="908" y="528" font-size="9" font-weight="500" fill="#8b85c4" letter-spacing="0.4" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">DEFAULT rate = 0.995 / HOUR</text>
  <text x="908" y="548" font-size="8.5" font-weight="500" fill="#6f699c" letter-spacing="0.3" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">MEMORYBANK-STYLE, ON last_accessed_at</text>

  <!-- final sort -->
  <line x1="640" y1="586" x2="640" y2="610" stroke="#3a3a44" stroke-width="1.4" marker-end="url(#arrS)" />
  <rect x="430" y="612" width="420" height="60" rx="11" fill="#0e1830" stroke="#2a4a82" stroke-width="1" />
  <text x="640" y="640" text-anchor="middle" font-size="14" font-weight="600" fill="#eef2fb">ORDER BY score DESC · LIMIT k</text>
  <text x="640" y="659" text-anchor="middle" font-size="8.5" font-weight="500" fill="#7f93bf" letter-spacing="0.8" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">min_score FILTER APPLIED BEFORE THE LIMIT</text>

  <!-- Footer -->
  <text x="640" y="730" text-anchor="middle" font-size="11" font-weight="600" fill="#55555f" letter-spacing="4" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,monospace">HYBRID RANKING</text>
</svg>
