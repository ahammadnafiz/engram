repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-toml
      - id: debug-statements

  # Lint/format scope matches pyproject's `tool.ruff.src = ["src", "tests"]`.
  # benchmark/ and Research/ are research artifacts the project doesn't lint,
  # so they don't gate commits on rules they were never held to.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^(src|tests)/
      - id: ruff-format
        files: ^(src|tests)/

  # mypy runs against the project environment (not an isolated, pinned copy) so
  # it honors pyproject's strict config and the curated `ignore_missing_imports`
  # overrides. An isolated hook can't see installed deps, so it diverges from
  # local `mypy src` and forces phantom `# type: ignore`s.
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: mypy
        language: system
        types: [python]
        files: ^src/
        pass_filenames: false
        args: ["src"]
